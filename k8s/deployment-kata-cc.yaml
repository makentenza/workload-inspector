apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-inspector-kata-cc
  namespace: workload-inspector
  labels:
    app: workload-inspector
    variant: kata-cc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-inspector
      variant: kata-cc
  template:
    metadata:
      labels:
        app: workload-inspector
        variant: kata-cc
    spec:
      runtimeClassName: kata-remote
      serviceAccountName: default
      containers:
      - name: inspector
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: SA_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: RUNTIME_CLASS
          value: kata-cc
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
