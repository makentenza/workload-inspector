apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-inspector-kata-remote
  namespace: workload-inspector
  labels:
    app: workload-inspector
    variant: kata-remote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-inspector
      variant: kata-remote
  template:
    metadata:
      labels:
        app: workload-inspector
        variant: kata-remote
        wi-role: probe
        wi-variant: kata-remote
      annotations:
        io.katacontainers.config.hypervisor.machine_type: e2-small
    spec:
      runtimeClassName: kata-remote
      serviceAccountName: default
      containers:
      - name: inspector
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: SA_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: RUNTIME_CLASS
          value: kata-remote
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
