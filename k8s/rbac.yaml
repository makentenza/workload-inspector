apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-inspector-dashboard
  namespace: workload-inspector
  labels:
    app: workload-inspector
    wi-role: dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workload-inspector-dashboard
  namespace: workload-inspector
  labels:
    app: workload-inspector
    wi-role: dashboard
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workload-inspector-dashboard
  namespace: workload-inspector
  labels:
    app: workload-inspector
    wi-role: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workload-inspector-dashboard
subjects:
- kind: ServiceAccount
  name: workload-inspector-dashboard
  namespace: workload-inspector
