<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workload Inspector</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f50d;</text></svg>">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-title">
                <span class="logo">&#x1f50d;</span>
                <div>
                    <h1>Workload Inspector</h1>
                    <p class="subtitle">Sandboxing and confidential computing across your workloads</p>
                </div>
            </div>
            <span id="timestamp" class="timestamp"></span>
        </div>
    </header>

    <main id="app">
        <section id="compare" class="compare" hidden>
            <span class="eyebrow">Instances</span>
            <div id="compare-strip" class="compare-strip"></div>
        </section>

        <section id="detail" class="detail">
            <div class="loading">Loading instances&hellip;</div>
        </section>
    </main>

    <footer>
        <span>workload-inspector</span>
        <span id="probe-version"></span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
